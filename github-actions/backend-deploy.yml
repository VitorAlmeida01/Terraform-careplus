name: CI/CD Backend CarePlus

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch para executar o workflow'
        required: true
        default: 'main'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment: ci-cd

    steps:
      # 1. Checkout do repositório do backend
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      # 2. Configurar JDK 21 (mesmo da EC2)
      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      # 3. Cache do Maven para acelerar builds futuros
      - name: Cache do Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4. Executar testes automatizados
      - name: Executar Testes Automatizados
        run: mvn clean test

      # 5. Gerar o JAR final (pulando testes pois já rodaram acima)
      - name: Gerar Artefato .JAR
        run: mvn -B package -DskipTests=true

      # 6. Renomear para nome fixo (ignora o .original do Spring Boot)
      - name: Renomear JAR para careplus.jar
        run: |
          JAR_NAME=$(ls target/*.jar | grep -v '\.original$' | head -1)
          mv "$JAR_NAME" target/careplus.jar
          echo "Artefato pronto: target/careplus.jar ($(du -sh target/careplus.jar | cut -f1))"

      # 7. Enviar JAR para a EC2 pública (frontend atua como jump host)
      - name: Copiar JAR para o jump host (EC2 Frontend)
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.FRONTEND_HOST }}
          REMOTE_USER: ubuntu
          TARGET: /home/ubuntu/
          ARGS: "-rltgoDzvO"
          SOURCE: "target/careplus.jar"

      # 8. Do jump host, envia o JAR para a EC2 privada do backend e reinicia o container
      - name: Deploy na EC2 Backend via jump host
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FRONTEND_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Cria PEM temporário a partir do secret para alcançar a EC2 privada
            ARQUIVO_PEM="/home/ubuntu/chavetmp.pem"
            rm -f $ARQUIVO_PEM
            echo "${{ secrets.EC2_SSH_KEY }}" > $ARQUIVO_PEM
            chmod 400 $ARQUIVO_PEM

            BACKEND_IP=${{ secrets.BACKEND_PRIVATE_IP }}

            echo "==> Garantindo permissões em /opt/careplus..."
            ssh -o StrictHostKeyChecking=no -i $ARQUIVO_PEM ubuntu@$BACKEND_IP \
              'sudo mkdir -p /opt/careplus && sudo chown -R ubuntu:ubuntu /opt/careplus'

            echo "==> Enviando careplus.jar para a EC2 privada ($BACKEND_IP)..."
            scp -o StrictHostKeyChecking=no -i $ARQUIVO_PEM \
              /home/ubuntu/careplus.jar \
              ubuntu@$BACKEND_IP:/opt/careplus/careplus.jar
            echo "JAR enviado"

            echo "==> Reiniciando container careplus-app..."
            ssh -o StrictHostKeyChecking=no -i $ARQUIVO_PEM ubuntu@$BACKEND_IP \
              'docker restart careplus-app'
            echo "Container reiniciado"

            echo "==> Aguardando aplicação subir (30s)..."
            sleep 30

            STATUS=$(ssh -o StrictHostKeyChecking=no -i $ARQUIVO_PEM ubuntu@$BACKEND_IP \
              'docker inspect --format="{{.State.Running}}" careplus-app 2>/dev/null || echo false')

            if [ "$STATUS" = "true" ]; then
              echo "✓ Backend CarePlus rodando com sucesso"
              ssh -o StrictHostKeyChecking=no -i $ARQUIVO_PEM ubuntu@$BACKEND_IP \
                'docker logs careplus-app --tail 30'
            else
              echo "✗ ERRO: Container não está em execução"
              ssh -o StrictHostKeyChecking=no -i $ARQUIVO_PEM ubuntu@$BACKEND_IP \
                'docker logs careplus-app --tail 50'
              rm -f $ARQUIVO_PEM
              exit 1
            fi

            rm -f $ARQUIVO_PEM
